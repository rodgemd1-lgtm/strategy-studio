    one_line_summary: "Cryptographic proof binding for all artifacts: sources, gates, signer, timestamp, hash, approval state."

    full_summary: |
      Every artifact produced by OpenClaw must include proof: sources (URIs), gates (gates passed to reach this artifact), signer (agent_id + HMAC), timestamp (UTC+Timezone), hash (content-addressable), approval_state (approved/pending/rejected), and fallback_sources (where to look if primary source becomes unavailable).

      Proof is NOT optional. It cannot be added post-hoc. It is computed inside the IQRSQPI process at the Proof step (P). Artifacts without proof cannot be integrated; they must be reworked. Proof schema is deterministic and queryable: one can reconstruct the decision path and dependencies.

    components_specified:
      - name: "Proof Generator"
        purpose: "At IQRSQPI-P step, bind artifact to sources, gates, signer, timestamp, hash, approval state"
        file_target: "artifacts/rig_engines_v3/proof_generator.py"
      - name: "Proof Validator"
        purpose: "At integration, verify proof is complete and hash matches artifact content"
        file_target: "artifacts/rig_engines_v3/proof_validator.py"
      - name: "Proof Store"
        purpose: "Immutable log of all proofs (sources, gates, signers, timestamps, hashes)"
        file_target: "services/memory/proof_store.sqlite"
      - name: "Provenance Tracer"
        purpose: "Given artifact hash, reconstruct full decision path and sources"
        file_target: "artifacts/rig_engines_v3/provenance_tracer.py"

    dependencies:
      - "BC-IQRSQPI-PROCESS (proof is step P in the process)"
      - "BC-MEMORY-GRAPH (stores proof references)"

    acceptance_criteria:
      - "All integrated artifacts have complete proof with sources, gates, signer, timestamp, hash"
      - "Proof validation enforced at integration boundary (no exception)"
      - "Provenance traceable back to original sources and decision gates"
      - "Proof store is immutable (append-only log)"
      - "Hash mismatches immediately halt integration"

    risk_or_open_questions:
      - "What is the fallback if primary sources become unreachable?"
      - "Should proof include intermediate reasoning steps or only final sources?"
      - "How to handle proofs that reference Mike's confidential sources (e.g., private emails)?"

    mike_decisions_required:
      - "Should non-approved artifacts be stored separately from approved ones?"
      - "What is the approval policy per level (L1-L7, e.g., L1 auto-approved, L6+ manual)?"
      - "How many fallback sources should be required (current assumption: ≥2)?"

