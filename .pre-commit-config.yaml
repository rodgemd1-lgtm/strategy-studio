# Layer 4: Pre-commit configuration for frozen contracts
# Block edits to contracts/v1/*.py that are in .rig/frozen-contracts.txt

repos:
  - repo: local
    hooks:
      - id: frozen-contracts
        name: Block frozen contract edits
        entry: bash .git/hooks/pre-commit
        language: system
        stages: [pre-commit]
        always_run: false