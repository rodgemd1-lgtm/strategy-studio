slug: bell_entanglement
codename: BELL
layer: physics
axis: "Genuine non-local correlation. Claim + evidence + falsification co-located in each major paragraph."

calibration:
  direction: gate
  pass_sigma: 12.0
  per_optional_bonus: 1.5
  hard_block_sigma: -30.0

questions:
  - id: bl1_claim_evidence_colocated
    question: "REQUIRED: At least 3 paragraphs contain a claim AND its evidence within 600 chars?"
    required: true
    mode: count_min
    pattern: '(\$\d|\d+%|\d+\s*(units|OEMs|customers|engineers)).{0,600}(source|cite|footnote|\[\d+\]|per (Research|Mordor|Grand|10-K)|Q[1-4]\s*FY?\s*\d)'
    threshold: 3

  - id: bl2_claim_falsification_colocated
    question: "REQUIRED: At least 2 paragraphs contain a claim AND a dated falsification within 800 chars?"
    required: true
    mode: proximity
    anchor: '(by Y3|Year 3.+\$|attach rate.+\d+%|software ARR.+\$)'
    target: '(kill criteria|wrong if|terminate if|no .+ by month|<.+by Q\d|by 202\d)'
    window_chars: 800

  - id: bl3_dated_kills_present
    question: "REQUIRED: ≥3 kill criteria with specific dates present anywhere?"
    required: true
    mode: count_min
    pattern: '(kill criteria.+by month \d|terminate.+by|no .+ by month|<.+by Q\d|extend at no additional fee|refund pro-rata|by 202\d)'
    threshold: 3

  - id: bl4_falsification_calendar
    question: "Is there a 'Falsification Calendar' or trigger-table section?"
    mode: regex
    pattern: '(falsification calendar|trigger date|kill criteria.*\n.*by month|review checkpoint.+date)'

  - id: bl5_load_bearing_claim_named
    question: "Is the one claim that, if false, kills the thesis explicitly identified?"
    mode: regex
    pattern: '(if .+(fails|misses).+reassess|the bet hinges on|load-bearing|the assumption.+if false|if .+ proves false|the deal-breaker)'

  - id: bl6_three_way_link_in_exec
    question: "Does the executive summary (first 2000 chars) contain claim+evidence+falsification together?"
    mode: regex
    pattern: '(?s)^.{0,2000}(\$\d|\d+%).{0,400}(source|cite|per|footnote|\[\d).{0,400}(kill|wrong if|terminate if|fall short)'

  - id: bl7_per_phase_metric_table
    question: "Is there an explicit phase-by-phase metric table or list?"
    mode: regex
    pattern: '(Foundation.+Activation.+Scale|Phase 1.+Phase 2.+Phase 3|Month [1-3].+Month [4-9].+Month 1[0-8])'
