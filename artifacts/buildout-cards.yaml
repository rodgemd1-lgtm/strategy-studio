    one_line_summary: "Physics-inspired ±30σ protocol with 10 deviate engines (Quantum Tunneling, Fine-Tuning, Phase Transitions, Hawking Radiation, Casimir Effect, etc.)"

    full_summary: |
      Extended RIG audit protocol beyond ±8σ to ±30σ using physics metaphors as computational constraints. Core insight: probability alone misses category-creating outliers; physics-inspired constraints (energy barriers, vacuum effects, phase boundaries) model harder constraints.

      10 engines: (1) Quantum Tunneling (crossing rigid categorical boundaries), (2) Fine-Tuning (necessity of extreme parameter alignment), (3) Phase Transitions (sudden state changes), (4) Hawking Radiation (information loss at event horizons), (5) Casimir Effect (emergent force from constraints), (6) Entropy Gradient (direction-of-time implications), (7) Pauli Exclusion (mutual exclusivity of states), (8) Resonance Coupling (frequency-matching novelty), (9) Perturbation Theory (small-epsilon impacts), (10) Symmetry Breaking (category emergence).

      Each engine computed as a constraint score; final audit score = mean(σ_z, engine_constraints). Results sorted into tiers: Routine (|σ_z| ≤ 2), Significant (2 < |σ_z| ≤ 8), Anomalous (8 < |σ_z| ≤ 20), Fundamental (|σ_z| > 20). Used in JAKE V10 outcome scoring and Capability Foundry retirement decisions.

    components_specified:
      - name: "Robust-MAD Calculator"
        purpose: "Core σ_z: 0.6745 × (x − median) / MAD, threshold ±8 for standard, ±30 for extended"
        file_target: "artifacts/rig_engines_v3/robust_mad.py"
      - name: "10 Physics Engines"
        purpose: "Compute constraint scores for each metaphor; combine into final audit score"
        file_target: "artifacts/rig_engines_v3/physics_engines/"
      - name: "Outcome Scorer"
        purpose: "Ties audit tier to JAKE feedback: positive tier→ capability preserved/promoted, anomalous→shadow testing, fundamental→governance review"
        file_target: "artifacts/rig_engines_v3/outcome_scorer.py"
      - name: "Tier Classifier"
        purpose: "Routes results to tier-specific handlers (Routine→auto-integrate, Anomalous→log+track, Fundamental→escalate)"
        file_target: "artifacts/rig_engines_v3/tier_classifier.py"

    dependencies:
      - "BC-DEVIATION-ENGINES (sister module, different focus)"
      - "BC-JAKE-V10 (consumes outcome scores for feedback)"

    acceptance_criteria:
      - "All 10 physics engines computed for every significant decision outcome"
      - "Outcomes sorted into Routine/Significant/Anomalous/Fundamental tiers"
      - "Fundamental tier (>20σ) triggers governance review"
      - "Tier-specific routing enforced at integration point"
      - "Audit scores persisted for historical trending"

    risk_or_open_questions:
      - "How to calibrate physics engine weights (currently unequal, need historical validation)?"
      - "Should anomalous outcomes (8-20σ) auto-trigger shadow testing or just logging?"
      - "Is ±30σ ceiling sufficient or should it extend further?"

    mike_decisions_required:
