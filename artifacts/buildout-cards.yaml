  - card_id: BC-DEVIATION-ENGINES
    title: "RIG OS Unified Deviation Engine V4: 30 Engines × ±20σ Full Spectrum"
    source_file: "/Users/mikerodgers/Downloads/Recall_export_2026-05-17T10-14-21/Behavioral Science/RIG OS Unified Deviation Engine V4 30 Engines × ±20σ Full Spectrum — 20 Cognitive + 10 Nature-Inspired, Complete Criteria, Formulas, and Gates.md"
    size_kb: 160
    maps_to_v2_layer: "Engines"
    maps_to_v2_studio: null
    maps_to_v1_phase: "B"
    priority: "P0"
    status_current: "built"
    one_line_summary: "30-engine deviation system (20 cognitive + 10 nature-inspired) scoring outputs across ±20σ spectrum."

    full_summary: |
      Comprehensive deviation scoring across 30 engines grouped into two families: Cognitive (20 engines covering reasoning depth, novelty, mechanism density, prediction accuracy, adversarial robustness, etc.) and Nature-Inspired (10 engines using physics/biology metaphors: Quantum Tunneling, Phase Transitions, Predator-Prey, Ant Colony, Mycelial Networks, Evolutionary Pressure, Cascade Collapse, Swarm Intelligence, Gradient Descent, Punctuated Equilibrium).

      Each engine produces a σ_z score (-20σ to +20σ). Final deviation score = mean(all engines). Gate: |deviation| ≥ 8σ to pass anti-median filter. Cognitive engines evaluated independently; nature engines provide constraint validation (e.g., is this idea sustainable as living system, or is it fragile?).

      Outputs mapped to tier: Routine (<2σ), Significant (2-8σ), Anomalous (8-20σ), Fundamental (>20σ). Each tier has routing: Routine→auto, Significant→log+track, Anomalous→shadow test, Fundamental→governance.

    components_specified:
      - name: "20 Cognitive Engines"
        purpose: "Score depth, novelty, mechanism, prediction, adversarial robustness, etc."
        file_target: "artifacts/rig_engines_v3/cognitive_engines/"
      - name: "10 Nature-Inspired Engines"
        purpose: "Physics/biology constraints: Quantum Tunneling, Phase Transitions, Predator-Prey, Ant Colony, etc."
        file_target: "artifacts/rig_engines_v3/nature_engines/"
      - name: "Unified Scorer"
        purpose: "Runs all 30 engines, computes mean σ_z, classifies into tier"
        file_target: "artifacts/rig_engines_v3/unified_deviation_scorer.py"
      - name: "Tier Router"
        purpose: "Routes output to tier-specific handlers (auto, log, shadow, escalate)"
        file_target: "artifacts/rig_engines_v3/tier_router.py"

    dependencies:
      - "BC-ROBUST-MAD-PROTOCOL (provides σ_z calculation)"
      - "BC-JAKE-V10 (consumes tier for feedback)"

    acceptance_criteria:
      - "All 30 engines computed for every output"
      - "Engine outputs averaged into final deviation score"
      - "Anti-median filter enforced (no <2σ shipping)"
      - "Tier routing enforced at integration"
      - "Historical trending stored for all outputs"

    risk_or_open_questions:
      - "Should cognitive and nature engines be weighted differently?"
      - "How to resolve conflicting engine outputs (e.g., high novelty but poor sustainability)?"
      - "Should engine weights be domain-specific (D1/D2/D3)?"

    mike_decisions_required:
      - "Are all 30 engines equally important or should some be weighted higher?"
      - "What is the acceptable false-positive rate for Fundamental tier (currently <1%)?"
      - "Should anomalous outputs auto-escalate or require manual review?"

