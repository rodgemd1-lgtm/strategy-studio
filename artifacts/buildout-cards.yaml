      Three daily digests (8am, 12pm, 4pm) report: live capture rate, 7-day sparkline, AI-clustered themes, agent coaching flags, prescriptive plays. NPS formula: % Promoters (9-10) − % Detractors (0-6). Volume tactics include SMS+email combo (98% vs 20-30% open), pre-staged review text, counter-staff verbal cues, T+2h timing. Architecture stitches open-source foundations (open-nps, nps-api, prometheus-nps, NPS Prediction, sales-nps-classification) with Twilio SMS, SendGrid/Resend email, Supabase backend, OpenAI embeddings. 12-week phased build, ≈<10% cost of Birdeye/Podium.

