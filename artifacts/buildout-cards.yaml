    one_line_summary: "7-step process (Intent → Question → Research → Solution → Quality → Proof → Integrate) with 28 archetypes across 4 BMS modes."

    full_summary: |
      IQRSQPI is the fundamental operating loop running inside each RIG 3D lattice coordinate. Steps: (1) Intent—determine request/trigger, (2) Question—convert to operational question, (3) Research—retrieve/generate evidence, (4) Solution—produce answer/artifact, (5) Quality—validate safety/usefulness/policy, (6) Proof—bind to sources/gates/signer/timestamp/hash, (7) Integrate—execute/save/route.

      28 reusable archetypes (4 BMS modes × 7 steps) encode typical patterns: A1.1–A1.7 (Python-only), A2.1–A2.7 (Hybrid), A3.1–A3.7 (Bounded-agent), A4.1–A4.7 (Free-agent). Each archetype specifies: inputs, outputs, tools, models, cost band, approval policy, audit policy, quality gates, proof policy.

    components_specified:
      - name: "Process Definition"
        purpose: "YAML spec for 7 IQRSQPI steps with phase objectives"
        file_target: "startup-os/IQRSQPI.yaml"
      - name: "28 Archetypes"
        purpose: "Templates for each BMS-mode × step combination"
        file_target: "artifacts/rig_engines_v3/archetypes/"
      - name: "Archetype Loader"
        purpose: "Runtime selects correct archetype based on BMS mode and step"
        file_target: "artifacts/rig_engines_v3/archetype_loader.py"
      - name: "Step Sequencer"
        purpose: "Enforces I1 → Q1 → R → S → Q2 → P → I2 order, prevents skipping"
        file_target: "artifacts/rig_engines_v3/step_sequencer.py"

    dependencies:
