    one_line_summary: "Bipolar deviation engine for all written comms (-20 to +20) with craft archetypes, prediction swarm, Brier calibration."

    full_summary: |
      V2 upgrades V1's communications scoring by promoting negative scores to first-class citizens. Both +20 (DETONATION) and -20 (EROSION) are valid targets; median (0) is the only forbidden state. Every artifact must be calibrated to one pole with explicit math.

      Formula: BDF = sign(intent) × |RobustMADZ| × CraftCoefficient × RestraintCoefficient. Gate: |BDF| ≥ 8.0 to ship. DetonationScore (positive pole) weights RuptureForce, SpecificityWeight, SacredWordFracture, IdentityIndictment, FalsifiableBet. ErosionScore (negative pole) weights Compression, Restraint, NegativeSpaceWeight, DurationOfSilence, SingleWordPrecision.

      CraftCoefficient runs all five prose archetypes (EminemDensity, HemingwayCompression, DidionCadence, McCarthyRhythm, WallaceRecursion) and takes maximum. RestraintCoefficient penalizes overwriting and qualification hedges. Bipolar Prediction Swarm runs 12 personas (6 positive, 6 negative) independently for every artifact. ManipulationRisk ceiling varies by pole; Brier calibration tracks persona accuracy separately for each pole.

    components_specified:
      - name: "BDF Calculator"
        purpose: "Executes Bipolar Deviation Formula for every artifact before shipping"
        file_target: "artifacts/rig_engines_v3/bdf_calculator.py"
      - name: "DetonationScore Engine"
        purpose: "Scores positive-pole artifacts (≥+16 target) across 9 weighted factors"
        file_target: "artifacts/rig_engines_v3/detonation_scorer.py"
      - name: "ErosionScore Engine"
        purpose: "Scores negative-pole artifacts (≤-16 target) across 7 weighted factors"
        file_target: "artifacts/rig_engines_v3/erosion_scorer.py"
      - name: "Craft Archetype Runner"
        purpose: "Computes all 5 craft coefficients, returns max to gate on ≥0.85"
        file_target: "artifacts/rig_engines_v3/craft_archetypes.py"
      - name: "Bipolar Prediction Swarm"
        purpose: "Runs 12 personas across both poles, computes consensus ≥0.65 gate"
        file_target: "artifacts/rig_engines_v3/swarm_bipolar.py"
      - name: "Brier Calibration"
        purpose: "Post-publication, track each persona's accuracy separately for positive and negative poles"
        file_target: "services/memory/brier_calibration.db"

    dependencies:
      - "BC-ROBUST-MAD-PROTOCOL (robust z-score calculation)"
      - "BC-DEVIATION-ENGINES (evaluation framework)"

    acceptance_criteria:
      - "All outputs land at ±8σ or higher from median (no median disguises)"
      - "Both poles have documented examples at -20, -16, -10, +10, +16, +20"
      - "Craft archetype selection explicitly reported in output metadata"
