slug: cognitive_sovereignty
codename: SHIELD
layer: cognitive
axis: Steelman every plausible attack with explicit rebuttal. 'Attacks survived' index.
questions:
- id: sh1_at_least_3_attacks_listed
  question: 'REQUIRED: at least 3 plausible attacks/concerns explicitly listed?'
  required: true
  mode: count_min
  pattern: (attack|concern|risk|objection|counter-argument|rebuttal):|.+would (argue|say|claim|push back)
  threshold: 3
- id: sh2_owner_family_attack
  question: 'REQUIRED: Hill family / ownership ''why now'' attack addressed?'
  required: true
  mode: regex
  pattern: (Hill family|ownership|family business).{0,200}(why now|risk|concern|conservative|cost of not moving)
- id: sh3_buyer_attack
  question: 'REQUIRED: buyer / Gijs ''too much'' attack addressed with comparable?'
  required: true
  mode: regex
  pattern: (too much|expensive|premium|justify|cost of|\$\d+).{0,400}(Helios|Topcon|comparable|peer benchmark|industry average)
- id: sh4_customer_attack
  question: 'REQUIRED: customer ''OEMs don''t pay for software'' attack addressed with precedent?'
  required: true
  mode: regex
  pattern: (OEMs? (don.t|won.t|will not) pay|customers? (don.t|won.t) pay|software (attach|premium)).{0,500}(Topcon|Wabtec|Allison|Cummins|Trimble|precedent|established|paid
    premium)
- id: sh5_engineering_attack
  question: 'REQUIRED: engineering feasibility attack addressed with spec/benchmark?'
  required: true
  mode: regex
  pattern: (<\s*\d+\s*ms|fits in|silicon spec|model size|CL-?\d{4}|benchmark|<\s*\d+\s*%\s*false[- ]positive|by Month \d benchmark)
- id: sh6_competitor_attack
  question: 'REQUIRED: competitor (Parker/Bosch) ''ships this fast'' attack addressed with structural barrier?'
  required: true
  mode: regex
  pattern: (Parker|Bosch).{0,400}(cannot|won.t|structural|CMMC|defense|integration risk|not certified|36-month head start|organizational
    antibody)
- id: sh7_attacks_survived_index
  question: Is there an 'attacks survived' index or explicit list of defended attacks?
  mode: regex
  pattern: (attacks? (survived|defended)|defense against|rebuttal index|objection log|steel-?man)
- id: sh8_no_dismissive_handling
  question: Zero dismissive phrases ('not a real concern', 'easily addressed')?
  mode: absent
  patterns:
  - (not a (real )?concern|easily addressed|simply (a matter|a question)|nothing to worry about)
- id: sh9_concession_made
  question: At least one concession or acceptable downside is acknowledged?
  mode: regex
  pattern: (we (accept|acknowledge|concede)|acceptable (downside|tradeoff)|HED holds defense, Parker takes commercial|fast-follower|second
    place)
- id: sh10_explicit_decision_owner
  question: 'REQUIRED: the human/board retains the decision; no coercive framing?'
  required: true
  mode: regex
  pattern: (your choice|your call|optional|opt-out|board decision|board approves|decision is yours|the choice is)
