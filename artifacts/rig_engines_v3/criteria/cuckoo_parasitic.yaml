slug: cuckoo_parasitic
codename: CUCKOO
layer: nature
axis: Inject parasitic high-deviation candidate. Force-feed at least one outlier.
questions:
- id: cu1_radical_option_present
  question: 'REQUIRED: at least one radical / uncomfortable option proposed?'
  required: true
  mode: regex
  pattern: (radical|uncomfortable|provocative|outlier|aggressive option|bold (move|bet)|category[- ]creating)
- id: cu2_demolish_orthodoxy
  question: 'REQUIRED: at least one industry orthodoxy explicitly demolished?'
  required: true
  mode: count_min
  pattern: (orthodoxy|conventional wisdom|industry assumes|the (standard|usual|typical) (way|approach|playbook))
  threshold: 1
- id: cu3_first_principles
  question: 'REQUIRED: first-principles rebuild present?'
  required: true
  mode: regex
  pattern: (first principles?|from scratch|fresh sheet|reset (assumption|premise)|tabula rasa)
- id: cu4_no_safe_default
  question: 'REQUIRED: doc avoids category-default safe-play framing?'
  required: true
  mode: absent
  patterns:
  - \b(industry[- ]standard approach|conventional methodology|tried[- ]and[- ]true|safe bet|low[- ]risk option)\b
- id: cu5_specific_inversion
  question: At least one specific inversion (instead of X, we do Y)?
  mode: regex
  pattern: (instead of|rather than|not .+ but|we (reject|refuse) .+ in favor of|inversion of)
- id: cu6_reframe_named
  question: 'REQUIRED: reframe explicitly named (the real category is, not just better X)?'
  required: true
  mode: regex
  pattern: (the real (category|business|game) is|not (just )?better|reframe:|the actual (problem|category|wedge))
