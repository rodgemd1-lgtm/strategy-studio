slug: bayesian_calibration
codename: BAYES
layer: cognitive
axis: Every probability is decomposed into conditional factors. Base rates anchored. Next update events named. Brier-score
  tracking.
questions:
- id: y1_explicit_probabilities
  question: Are at least 4 explicit probability statements present?
  mode: count_min
  pattern: \b\d{1,3}%\s*(probability|likelihood|chance|conditional|of)|\bP\(.+\)
  threshold: 3
- id: y2_conditional_probabilities
  question: Are conditional probabilities (P(A|B)) used at least once?
  mode: count_min
  pattern: (P\(.+\|.+\)|probability.+(given|conditional on|assuming|if)|conditional probability)
  threshold: 1
- id: y3_base_rate_anchored
  question: Is at least one claim anchored to a base rate or comparable?
  mode: count_min
  pattern: (base rate|comparable|like Helios|like Topcon|like Wabtec|historically|prior engagements|industry average|peer
    benchmark)
  threshold: 2
- id: y4_probability_ranges_not_points
  question: Are competitor/scenario probabilities given as bands (e.g. 25-35%) where appropriate?
  mode: count_min
  pattern: "\\d+\\s*[-\u2013to]\\s*\\d+\\s*%"
  threshold: 2
- id: y5_downside_base_upside_scenarios
  question: Are downside/base/upside scenarios with revenue numbers shown?
  mode: regex
  pattern: (downside.{0,80}base.{0,80}upside|DOWNSIDE.*BASE.*UPSIDE|worst case.+best case)
- id: y6_premortem_or_failure_modes
  question: Is there an explicit pre-mortem with 3+ ranked failure modes?
  mode: regex
  pattern: (pre-?mortem|failure mode|risk:.+|composite probability.+(failure|fail))
- id: y7_next_update_event
  question: Is at least one 'next update event' named (e.g., 'this updates when CMMC Phase 2 starts')?
  mode: count_min
  pattern: (updates when|updates if|next signal|next data point|recalibrate when|review when|trigger:)
  threshold: 1
- id: y8_competitor_probabilities_decomposed
  question: Are at least 2 competitor probabilities given (Parker, Bosch, Grayhill, etc.)?
  mode: count_min
  pattern: (Parker|Bosch|Grayhill|Curtiss-?Wright|Helios|APEM|Camgian|Trackunit).{0,80}\d+%
  threshold: 2
- id: y9_explicit_uncertainty
  question: Are uncertainty markers used (estimated, calibrated, approximate)?
  mode: count_min
  pattern: "\\b(estimate|calibrated|approximate|\xB1|approximately|roughly|order of magnitude|confidence)\\b"
  threshold: 3
- id: y10_brier_or_calibration_artifact
  question: Is there a Brier-score, calibration-tracking, or forecast-review artifact mentioned?
  mode: regex
  pattern: (Brier|calibration (table|review|tracker)|forecast log|prediction tracker|forecast review)
