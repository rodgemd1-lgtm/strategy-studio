      Privacy scopes: Mike_only (personal), Team (RIG staff), Public (published). Every write tagged with provenance: (agent_id, timestamp, cell_id, proof_hash). Rollback granularity down to individual write. Schema: nodes (facts, decisions, outcomes), edges (supports, contradicts, refines, falsifies), confidence scores, temporal validity, source URI.

